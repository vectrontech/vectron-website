<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Engineering services hero placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0b0b"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a0a0a0"/>
      <stop offset="25%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#909090"/>
      <stop offset="80%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a8a8a8"/>
    </linearGradient>
    <pattern id="mesh" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 0 0 L 24 12 L 0 24 Z M 24 0 L 24 24" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
    <radialGradient id="rf" cx="80%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#5eead4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#mesh)"/>
  <rect width="1200" height="800" fill="url(#rf)"/>
  <!-- technical component silhouette -->
  <g transform="translate(240 240)">
    <rect x="0" y="0" width="720" height="320" rx="8" fill="url(#chrome)" opacity="0.9"/>
    <rect x="40" y="40" width="640" height="240" rx="4" fill="#0b0b0b"/>
    <g stroke="rgba(94,234,212,0.55)" stroke-width="1" fill="none">
      <path d="M 80 160 L 200 160 L 240 120 L 320 120 L 360 160 L 520 160 L 560 200 L 640 200"/>
      <circle cx="80" cy="160" r="4" fill="rgba(94,234,212,0.6)"/>
      <circle cx="320" cy="120" r="4" fill="rgba(94,234,212,0.6)"/>
      <circle cx="640" cy="200" r="4" fill="rgba(94,234,212,0.6)"/>
    </g>
  </g>
  <text x="600" y="730" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" fill="#7a7a7a" letter-spacing="6">PLACEHOLDER — ENGINEERING</text>
</svg>
